name = "chart-watcher"
main = "worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for IP-based rate limiting on /analyze
# Create with: wrangler kv:namespace create RATE_LIMIT
# Then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "807ada6650a1466a88b092fcac5ef722"

# Secrets set with:
#   wrangler secret put ANTHROPIC_API_KEY   # for Sonnet 4.6 toggle
#   wrangler secret put GEMINI_API_KEY      # default model (Gemini 3 Flash)
#   wrangler secret put FINNHUB_API_KEY     # fundamentals data
# Do NOT put keys in this file.
